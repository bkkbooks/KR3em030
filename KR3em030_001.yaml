body:
  text: 卷上診法診喉症當辨內外二因喉症切脈須辨內外二因內因系房勞傷腎鬱怒傷肝或喜啖煎炒炙爆熱傷肺胃熬損陰津逐漸而起脈宜細數有力忌芤澀外因感六淫之氣邪客肺胃痰火上壅驟然而發脈宜浮洪滑數忌急促無神結代沉伏者不治舌病脈當左寸大於右手牙病脈當右關大於左手正者為順反者為逆醫者須明辨治之診脈合症萬無一失諤按舌為心苗舌病脈左寸大於左手者心火熾而肺氣鬱也牙為骨余而齦屬脾胃牙病脈右關大於左手者脾胃之熱戀而肝膽之氣不疏也論脈之部位及其現狀夫脈有表裡定位右手寸口表手陽明大腸傳道之官裡手太陰肺相傅之官脈浮澀而短右手關部表足陽明胃倉廩之官里足太陰脾諫議之官脈緩而散大右手尺部表手少陽三焦決瀆之官裡手厥陰心包絡命門臣使之官脈緩而悠洋左手寸口表手太陽小腸受盛之官裡手少陰心君主之官脈悠洋緩散左手關部表足少陽膽中正之官里足厥陰肝將軍之官脈沉而弦長左手尺部表足太陽膀胱州都之官里足少陰腎作強之官脈虛細女尺宜大三部之脈呼吸四至為平反此則病遲寒數熱細緩虛寒細數虛熱脈位既定乃審苗竅諤按此言診脈大端簡而賅要而明若欲窮源溯洄尤當博考群書方臻完善論舌之部位及其所屬舌屬心舌之中屬心舌根亦屬心舌之四圍屬脾舌邊紅屬心火舌苔白寒黃熱焦黃熱甚黑者熱極若黑而潤為假熱喉之左右通舌根屬肝小舌名帝丁屬胃又屬腎右喉屬肺胃左咽屬肝心右為喉左為咽口上顎屬胃下顎屬脾牙上齦屬胃下齦屬脾唇之屬與齦同齒屬腎上齒為胃脈所經下齒為大腸脈所經小腸三焦循心上入於咽腎之脈循喉嚨挾舌本外兩耳垂下屬肝經繞咽並耳後清空之地亦屬肝經喉花為帝中性命所關舌下紫筋為舌系下通於腎諤按挾舌本下二句疑有誤考內經腎之脈正者至舌本而盡汪訒庵注謂絡於橫骨終於會厭未嘗走及兩耳而肝之脈循喉嚨之後上入頏顙連目系上出額與督脈會於巔腎肝二經並非行於兩耳惟足少陽膽正者下耳後其支者從耳後入耳中出走耳前此是膽脈之誤茲特訂正之是辨症咽喉症有虛實寒熱之不同及其治法論夫咽者水穀之道路喉者呼吸之門戶乃人身要害之地症雖不一大要總歸於火蓋少陰少陽君相二火其脈並絡於咽喉故往往為症之所結敘經云一陽一陰結為喉痹痹者閉也不通其閉則火鬱痰塞而死火乃痰之本痰乃火之標故言火則痰在其中言咽喉則牙舌亦包羅於內矣諤按濕夾熱而生痰火載氣而上逆痰隨氣湧化痰以降氣為先氣因火逆降氣以清火為要此為治喉症之不二法門即伏邪之已化熱而挾痰火者亦當宗之若表未清而挾飲邪熱未化而有食滯者不可輕試火有虛實實火因過食煎炒炙爆蘊熱積毒其症煩渴二便閉塞風火生痰上壅將發喉痹必先三日胸膈不利脈弦而數治宜先去風痰後解熱毒虛火或飲食太過或因忿怒或因色欲火痰上攻咽喉乾燥必二便如常少陰脈微虛治宜補虛降火諤按此補字宜看得活凡用藥不可純用寒涼取效目前諤按早用寒涼爐焰之火雖熄灰中尚有餘火也蓋上熱未除中寒復起毒氣乘虛入腹胸前高起上喘下泄手足指甲青黑色七日以後全不進食口如魚口者死治喉症最忌發汗誤人不淺如針出血即汗之之義若寒傷於腎及帝中腫者尤不宜針至如內傷虛損咽喉失音無法可療喉症初發一日即見寒戰戰後身涼口不碎又無重舌或二便俱利不可認作熱症此上盛下虛其痰不可提盡此痰即津液所化只宜消降亦不可太降其與熱症乳蛾皯舌之痰毒腫一處以消盡毒痰而愈者不同若提盡則津竭神枯必死須以吹藥或用燈草取嚏使喉一通即服煎劑第一劑發散和解第二劑養陰溫補設三四日後再發寒戰或心痛骨痛腳痛等症皆屬難治發時牙關緊閉喉舌俱脹口碎而臭或有重舌及舌有黃屑發後下午再發寒熱二便閉寒即作熱症諤按天氣瀰漫鬱蒸地道必不能通所以果屬熱症大便必堅芩連敗毒散主之此亦易愈之症如漸至三四日後而寒熱者雖凶亦不為患惟牙關反不緊閉唇不腫口不臭又無表熱者難治舌以筋押之其色雪白起筋即紫紅色此血肉已死原注舌押之即白未必為死也然口臭者或有可生諤按胃氣尚存故得上熏於喉而為臭其毒有向外出之機也若口渴氣急痰多而稠如桃膠者則死期已速一頸具紅腫者亦危症也面帶紫色面青帶白神氣虛者俱難救不語者死略能語者尚有可生之機面色無神喜坐低處難治喉花為帝中性命所關舌下紫筋為舌系下通於腎白腫不治傷之即死凡治不可不審之論纏喉風不宜過用滌痰凡纏喉風及一切喉症去痰太多則內必虛如陰症傷寒一般必用人參少加肉桂導火歸元方可醫治唇白者不治頭面項腫者無妨如紅腫至胸前難治因毒氣攻心也原注紅腫至胸前余父曾治謝姓客前劑中用護心散而愈若不用此毒歸於心笑不休而死無痰者不治痰去太多則精神已竭病雖似好飲食如常不知者以為全愈殊不知少頃即發脈細即死如未譫語急用人參可救氣急不治病久寒戰骨痛不治寒戰一日外即死唇如胡桃肉色不治醬色亦不治使病人與好人同坐衣冠若無病者諤按衣冠二字不妥宜易氣色二字見其唇上有如桃膠黏痰不出一語者即刻死矣唇如硃紅漆色不語者醫至終日即能語諤按此與轉筋同意先寒熱而後發症者極重如寒熱同喉症齊發者亦重然不致死此驟發而言也諤按凡喉症之屬於陰虛者皆由相火不潛而真陰漓散也治宜用導龍歸海法據其窟宅而招之非尋常感受風熱之喉症可比又喉症有漸發驟發二端漸發者多活驟發者多死漸發者輕驟發者重然驟發即治亦不致死漸發失治亦多致死此是喉症總綱吃緊之論類證一乳蛾有單有雙有連珠多因酒色過度鬱結而生初起一日疼二日紅腫三日有形如有細白星者若發寒熱即飛蛾之凶症也四日凶勢定治之四五日可愈其症生於喉旁左屬心右屬肺又云在右者為喉肺病因氣而得在左者為咽胃病因食熱毒而生一邊者單二邊者雙二星上下相連狀如纏袋又如蠶繭子樣者為連珠單者輕雙者重連珠者更重發寒熱者凶若傷寒後患蛾及閉者不治又有急者旦發暮死又有慢蛾風四五日可治又血蛾用銀針挑破血泡即愈諤按甲寅秋張蘭章夫人痰凝氣滯木鬱不達近感風邪包裹裡熱蘊而不化咽喉偏右白腐頭痛咳而無痰單乳蛾之凶症也脈細弦苔白用宣肺疏氣化痰清熱法炒荊芥桑葉杭菊杏仁連翹象貝母廣鬱金制香附黑山梔朱赤苓生決明蛤殼白蒺藜薄荷葉玉桔梗為方外吹用師授中白散柳華散合冰梅丹一劑霍然中白散諸方另載於增録一束內二喉菌因憂鬱過思血熱氣滯而生婦人多患之狀如浮萍略高而厚紫色生於喉嚨兩旁難求速愈輕則半月重則月餘治者要得法患者須守戒忌口戒欲並一切毒物諤按此症如四七烏沉二陳半貝旋覆花湯及逍遙丸之類均可選用三蟻毒瘻項下忽腫一塊漸延至頸偶破出水碗許爛久不合此因食中偶食毒蟻所生故名之初起者易治久者難痊四喉癬此虛火上炎肺受燥熱致攻喉間生紅絲如哥窯紋又如海棠葉背紋乾燥妨食或痛或癢雖不喪命亦難速愈如用藥遲延不守戒忌必生重症久則失音不救勞症多患之諤按凡患喉症均當忌口戒欲前於師處臨診見有一石姓女者患咽痛經師治愈後忽一日復來診猝然失音帝丁紅腫診脈尺大而浮知其不戒欲之故乃用養陰攝納法而愈又按今人患溫病或濕溫等症一見喉中癢痛即以為喉癬遂送猴齋猴無所不至實非喉癬症積習之陋可嗤可嘆五塞喉風喉痹敘毒痰涎稠實而發寒熱關上可治關下難治諤按塞喉風純系痰氣阻塞用余自制霹靂針開關繼用中白烏牛散及柳華祕藥吹之內服以滌痰通便為要六喉癰因過食辛辣炙爆厚味醇酒感熱而發或七情鬱結而生皆屬肺病景華按林佩琴云胃大腸二經喉間無形但紅腫而痛重者亦發寒熱頭疼四五日可愈有白星者為蛾無星者名癰七皯舌喉癰肥人感熱性躁多生此症凡舌下生如小舌樣者為皯舌如連喉腫痛為喉癰此乃心脾二經之鬱火上攻使然皯舌兼喉癰併發其勢最重速治可愈傷寒後發者難治如氣閉不通無形無聲多是危症諤按又有一種外喉癰咽喉不痛生於頦下紅腫穿潰一候即愈甲寅秋治一張姓者暑熱內蘊透發肌膚暑癤瘰瘰頦下結核紅腫作痛已成下喉癰勢難消散宜清營化毒速潰速愈以止其蔓方用銀花連翹大貝母薑山梔防風赤苓苡米夏枯草蟬衣竹葉西赤芍服一劑後即用刀開潰後膿泄稀少腫勢不退脈弦徑宜托毒化膿腫消為要方用炒牛蒡炒荊芥防風連翹大貝母金銀花黑山梔蟬衣鉤鉤白蒺藜鹽水炒生甘草地丁草薑竹茹薄荷葉外摻自制去解妙丹一候即愈內癰以不潰為妙八纏喉風因心中燥結而發先二日必胸膈氣緊呼吸氣促忽然咽喉腫痛手足厥逆頸紋如縛熱結於內腫繞於外且麻且癢喉中紅絲纏緊指甲或白或青手心壯熱喉腫而大痰聲如鋸其症最急初起即治可救若過一日夜後目直視而睛定聲如雷鳴者不治探以燈火近患人口邊即吹滅者不治若見喘急額汗危在旦夕矣腎經有熱致令心火盛也原注吹丹內必加牛黃為妙諤按纏喉風較塞喉風勢猛而險一則開關化痰而愈一則必須顧及少陰而初起總以開痰為要九喉刺多因勞病未愈虛火上炎營血已竭其症上顎有紅點密密如蚊齧痕此是危篤將殂慎勿視之以取謗怨也十酒毒喉痹外見赤腫內形如雞子其色鮮紅光亮如鏡發熱惡寒目睛上視此心脾積熱形象雖凶速治可愈諤按河間論治喉痹猶之救火即內經火鬱發之之意發為發汗然咽喉中不能發汗故出血者乃發汗之一端十一喉瘤生於喉間兩旁有單有雙形有圓眼大許血絲相里似瘤者故名之此因肺經受熱多語損氣或怒中高喊或誦讀太急或多飲燒酒倘吃炙爆硬物犯之即痛不犯不痛須斂神晏息以清降之藥治之便愈諤按此與梅核氣症相似因於七情鬱結痰凝氣滯而成不可妄用刀針宜吹余冰梅丹合白金散內服如四七越鞠旋覆蔥絳之屬可冀向愈十二喉肉球如圓眼核樣有根線長五寸許吐球出外方可飲食以手輕捻痛徹至心此球是心肺受熱所生也十三心出氣舌上忽有簪孔出不止者此屬心經火甚也景華按此症是舌衄之類治當補心清火諤按此症用蒲連散摻之內服如梔連翹芩等可愈出字下似脫一血字十四喉百葉咽喉中有生肉層層相疊漸腫有孔出臭氣者是因肺受熱毒所致也十五牙槽風初起先齒痛不已復牙根肉即浮腫紫黑色或出血久則腐爛而臭也十六牙漏即前症相同久則不愈齒縫出白膿極難調治甚則齒落如落上左邊門牙一概不治以上二症俱屬胃腎虛熱也十七牙皯屬胃火如豆大或內或外生無定處十八牙宣齒縫出血上屬脾下屬胃實火上攻所致亦有胃虛火動腐爛牙根以致滲漏不已十九牙癰初起生一小塊於牙根肉或上或下或內或外其狀高起而硬此脾胃火也諤按此症患者極多大都內蘊熱而外束風邪所致必牽引頰車牙咬為之開合不利宜用大豆卷桑葉荊防角針殭蠶象貝連翹薄荷甘桔川芎蟬衣鉤鉤蒺藜之屬一二劑即愈余治此症屢試屢驗昧者用膏藥一貼悶成壞症夥矣二十牙菌生於牙根紫黑色高起如菌狀此係火甚血熱而兼氣滯或好飲燒酒酒濕傷脾濕鬱生火致有此症諤按此症宜用苦辛溫法疏氣化痰兼解毒治之如銀花甘草緑豆衣之屬均可用二十一穿牙疔毒先三日牙疼發寒熱痛不可忍牙根上發一塊紫色者是未破者為疔已破者為毒其色紅者可治如青色者不治二十二走馬疳或因胎毒或痘後發毒攻齒牙根腐爛成疳殺人最速鼻梁發紅點如珠者不治惟螻蛄散可治疳如醬色一日爛一分二日爛一分故曰走馬以喻速也齒落盡者死二十三小兒走馬疳及牙槽風俱要防齒落左邊上門牙為牙中之主此牙一落則余牙盡落矣最重難治若此牙不落別牙雖落治之可生穿腮不治有螻蛄散可治青黑色者難治痧後疳單用梧桐葉煎湯洗腳即刻痊愈應驗如神諤按走馬疳之猝起者宜用涼藥若系病後而起宜用附子半夏加蔥白搗爛扎腳底可愈相傳單方極多類皆有效有不效總之隨起隨治尚有可愈之理惟此症之涎唾極毒一切器具如押舌等用後必須揩擦乾淨免致傳染二十四崩砂口疳風是舌下牙根上腫赤口內作痛如湯熱牙根漸爛亦能脫落牙齒二十五舌癰舌赤腫大屬心經火盛地角亦紅腫又舌上腫痛色黃名舌黃亦屬心火諤按此與下三症均宜大清心熱用犀羚合敗毒散之類並宜吹祕藥及孟英錫類散等均妙二十六重舌舌下生小舌樣其色或紅或紫又名雀舌小兒胎毒亦有患此二十七蟬舌亦前症之類如生舌根連喉腫者名為皯舌非比重舌易治治之不明恐難速愈此心經受熱毒氣出於舌下也二十八連珠口疳風自舌上起一小泡發一個又一個甚者七八個連珠而生舌黃舌上腫痛獨生舌中者名為舌楊梅俱屬心火治用口疳藥吹之二十九木舌舌腫大如煎熟豬肝不能轉動是憂鬱所致又有一種生舌根下狀如白棗即重舌有青紫筋者不能速愈初起不疼不發寒熱漸漸腫大初起即治可愈遲則難痊諤按此屬陰症治宜大辛溫蒸動腎陽方可若用寒涼便誤三十蛾口一名雪口初生月內小兒滿口舌上白屑如蛾口樣者故名之形如腐衣後變黃色轉如黑色者不治若口如魚口或作鴉聲者難治此心脾積熱又名迷口諤按此症余用柳華散吹另以真青布濕薄荷水拭之極效三十一馬牙初生小兒胎內已受熱毒見風而生但看牙根上有白色如脆骨者是此症初發必打噴嚏含乳在口或吞或吐而不吮其病已深若不急治入腹而死凡百日後不患此症三十二懸癰生於上顎形如紫李子樣墜下抵舌其人口不能言舌不能伸頭不能低仰面而立鼻中時出紅涕若不速治至毒入腦即死又有一種堅俱蟲毒風上顎略腫水食不下狀如雞子如破爛穿顎即名天穿不治景華按堅俱一二字文理不通想傳鈔之誤姑存之備考三十三松子風口內滿喉赤如肝脹口吐物出氣逆關閉不能飲食凶症也三十四結毒隨經絡而發或口或舌不拘定處爛久不愈者是也認定經絡部分諤按結毒隨症皆有不必喉症為然三十五紫舌脹屬心火內必煩躁悶亂三十六舌菌多因氣鬱而生如菌狀或如木耳樣色紅色紫皆屬心火治用金丹碧丹和吹內服煎劑同舌癰法三十七帝中喉風即喉嚨花腫脹重者至於發泡蓋塞咽喉氣難呼吸此屬腎虛火旺並感風熱而生三十八頰癰胸前紅腫形現在外亦欲內攻甚則喉腫閉而出膿三十九蜂子毒與前症相似或在臉腮癢爛或在喉間舌下色黃如蜂者凶症也四十面癰與前症相仿又名爛頰風腮頰風毒結盡牙處腫大抵皆屬鬱火也四十一托腮癰生於腮下因過食厚味多因醇酒熱毒所結而生也治法一治病必須明症用藥不可閉門捉賊又不可引賊入門反增他疾凡治喉症皆君相二火法當清降表裡同治驅放賊邪為要然不可混用石膏妄清肺胃關門留賊傷咽而斃如舌症屬心脾二經之火又宜表裡兼治亦不可亂用芩膏妄清肺經引賊入門致生喉脹痰塞之患又如牙症屬脾胃二經之火不可反用芩連妄投過經藥味致有喉舌腫脹之患他若溫熱病後腎液乾枯不能上潤於心心火發動上衝咽喉干痛宜用清心滋腎為主知柏川連麥冬硃砂等味可愈不可誤投表味若用發散必致精竭神枯而死學者須審準經絡方可下手不得混行施治諤按此段論喉症治法極精示人以不可妄涼確有至理然亦有宜涼者須合苔脈方可不得膠柱豉瑟也二凡喉症先用吹丹一二管使其痰出視其痰濃否緊否如痰起濃黃緊扯捺不開痰黏藥管難拭去者危症也如吹初管藥其痰多緊而不出其勢危急死在須臾將吹丹用薄荷竹瀝泡湯冷透投入調勻灌之自無痰塞之患此心法也諤按亦有宜針啞門少商曲池廉泉等穴而後肺氣不致蔽塞內關得以開轉者針後再用霹靂針吹之痰無有不吐之理惟服竹瀝一兩者必滴入生薑汁二三匙方妥三凡喉症頸項赤腫深受時毒赤腫不可至胸至胸必死謂之毒歸於心其人必歡笑與煎劑同服護住其心多服解毒之品使毒漸平為妥亦心法也四凡咽喉齒舌症須辨內外二因虛實二火虛者或病後或酒色虛火上炎宜養陰降火又須守戒耐心自能漸愈實者因感時邪觸動君相二火重者寒熱頭疼先宜清泄清散開結逐毒滌痰之法並行為妙清心用犀角清中有散不宜黃連黃芩苦寒諤按如舌尖深絳有刺亦有可用之處恐扼火毒使痊後復發泄散宜用葛根薄荷防風青蒿然葛根最竭胃汁不宜輕用青蒿易荊芥為妙不可用升麻柴胡桔梗諤按今之桔梗率是薺苨亦有可用處惟宜輕升提其火然芩連亦有用之者齒舌之症用亦無妨火邪鬱結於中而用大黃芒硝下之人症俱實瀉火後症消而愈是霸術也務期認症的確方可行之若稍差遲為禍非淺愚謂症退而火自泄津液回而大便解亦祕法也五凡陰虛喉痹口舌生瘡破爛或聲啞者皆水虧火旺之症初起宜加味射干湯次用滋陰消痹湯亦有未成勞瘵遽然音啞以致嗽唾無休偶或飲寒或過用涼劑郁其火於肺初宜清肺散火湯驅寒氣以泄火邪次用滋陰降火清肺之劑如喉痹腫痛甚者加味射干湯或用熊膽冰黃散吹喉中如喉痹延及口舌生瘡破爛者柳黃散搽之陰火上炎未成勞瘵遽然聲啞有痰嗽者清肺散火二三劑後用滋水開陰湯六喉症至五日則重如三日前症雖重尚未成膿藥能消散若至五六日患處多成膿矣縱使穿破必有爛窠難愈爛處必用口疳藥多加龍骨兒茶疊吹而愈凡傷寒後患連珠乳蛾及喉痹者不治惟張氏有治其喉症頸項強硬目睛上視氣絶者不治喉痛起至一二日未必發寒熱病尚輕緩若至第三日必發重症必加寒熱須問大小便通利否如二便俱利其症不過浮遊之火攻於咽喉宜服清風清熱降火之藥即愈若大小便不通內有實火若非用降火解毒之劑兼通二便之藥火從何而泄病如何而解乎故症有輕重病有緩急要問其頭痛不痛如痛則是傷寒難治之症也諤按多加龍骨兒茶亦非所宜若內蘊之熱毒未清則江河易於潰決也七喉症雖凶若腫發於外危症雖見者治之易愈八帝中腫脹雖難吸氣之重症速治即愈遲則亦重矣喉症必大便去後方可望痊如大便閉結不可輕許其愈諤按此即地道通而天氣降釜底抽薪之意亦有大便雖通而虛陽上逆腫痛極甚者宜用養陰清化治白喉法是也九喉症初起大便閉結宜大黃元明粉兼用表裡之品下之則降火而易痊若五六日久不食大便閉塞此由病久胃氣已虛元氣已弱禁用硝黃不可妄投霸劑以致虛脫而死欲通其便只宜養陰降火兼蜜導等潤藥下之此祕法也若用硝黃須診其脈來有無力可下則下之諤按右關沉實有力或滑數鼓指者均可下景華按風火喉症至喉閉時氣血必滯脈必沉澀不可誤認無力斯時憑症不憑脈須審其胃氣之有無如胃氣尚存宜下之十喉症吹藥必要直對喉中周遍重吹四五管方可消降毒痰三四次後用煎藥方可全愈十一喉症先碎須長肉藥吹蓋破處後用諸吹藥頻吹腫消為妙十二喉症一二日腫痛三四日勢定有形每至三日猶發寒熱或頭疼須刻刻吹藥總不可緩即知生死在幾日間矣景華按婦人喉症腫痛經水適止火不下達者宜通其經而喉自愈諤按此即所謂熱入血室也不獨喉症為然傷寒溫病均有此症宜清營分而愈十三凶喉之症頭面發腫白亮無光彩脈來沉細無神是神氣外泄無陽之症也斷不可治若面發紅腫脈洪大有力症雖極重元氣尚強毒火雖盛治之易痊十四腮易腫爛用筷縛絲綿蘸水輕攪患處痛者用藥必愈若不知痛者是死肉難愈十五舌腫脹滿口吐舌在外難以納藥者用開關散吹入鼻中牙關自開痰涎自出然後用筷卷綿蘸甘草湯潤其口唇後送丹散頻吹而愈十六吹藥非惟腫破患處要吹並周圍好肉上亦須吹之方免延開且易於愈也口舌等症吹藥後如舌上無涎或如干橘囊者不治十七口舌腐爛無血出者不治穿腮者不治爛至鼻梁發紅點者不治惟張氏有治如舌腫大用生黃柏加冰片敷之若出血用炒黃柏冰片此妙法也十八如患皯舌喉癰若大便閉結煎劑內加元明粉大黃小便不通加六一散調服服之甚效此心法也十九如患牙咬癰則牙齦肉脹突出牙關緊閉口不能開先用甘遂散配製巴豆少許吹入牙齦內用押舌器漸漸擦開牙關用藥頻吹而愈二十口疳用絲綿輕攪切不可用青布恐患處受傷難愈合藥取於辛散以細為主收儲不可出氣須用烏金紙塞緊瓶口為妙凡不經火之藥味宜曬脆為末用之藥例總論喉症用藥必須認症的確按脈之虛實火之盛衰須要活潑不可按圖索驥又不可膠柱豉瑟乃為善治若症有寒熱頭疼六脈弦緊始發必須表散須兼清火開結滌痰解毒表散葛根防風薄荷青蒿羌活荊芥散風熱按經治清火犀角連翹元參山豆根此清心胃腎之火蘆根亦清胃火三焦火黑山梔肝鬱火青黛開鬱結射干川貝滌痰淡竹油前胡杏仁橘紅大力子解毒大貝母甘草金銀花寬癰天花粉赤芍小便赤澀木通通草車前子鮮荷梗胸膈飽悶枳殼大便閉結六脈有力舌苔黃壯火大黃鮮生地元明粉腎經虛火可用知母黃柏投之無不驗也如舌症舌乃心之苗宜用清心解毒前法可用舌症之毒可用伏龍肝燈心為引牙症乃脾胃之部清用石膏生地知母黃柏黃芩黃連或炒黑升麻為佐解毒用人中黃人中白金汁若穿牙疔與牙咬癰用紫花地丁草如素虛與病後虛火上炎可用滋陰降火佐之以補宜大生地大熟地枸杞玉竹洋參人參西黨參北沙參天麥冬女貞子黃香梨甘蔗首烏虛熱地骨皮丹皮丹參鮮沙參鮮首烏鮮石斛川石斛之類是也略具大綱以備選用諤按此例可遵用者固多不適用者亦有在學者臨證時權衡不可刻板方以治活病斯得余重編之心矣一治雙單連珠乳蛾連砂散配製巴豆吹之倘成膿黃熟者用代針散吹之出膿血而愈重則煎劑中下加黃連犀角上加赤芍柴胡雙蛾則兼用之大便不通宜加枳殼元明粉服下少頃候大便通利則症自愈至三四日看喉內但有紅腫而無白星者即是喉癰也二治喉癰八味薄荷散連砂散加制巴豆吹之治喉腫甚痛用七味殭蠶散甘遂散入制巴豆頻吹如重並服煎劑用犀角地黃湯加減並服膏丸如大便祕結加大黃元明粉如小便不利加六一散諤按余治喉症用全栝蔞同元明粉打生枳殼同風化硝打輒效後遇藥肆某君謂余曰風化硝與元明粉即一種何以本草別為二種其主治又不同故志於此以質世之博雅究竟同乎異乎三治喉癬用喉癬方頻吹百草膏不時頻咽再服煎劑內加土貝母下氣忌憂思忿怒酒色並雞蝦蟹羊鵝豬首肝腸一切毒物炙爆及引氣動火之物守戒一月可愈諤按土貝母宜慎用四治喉菌用連砂散加重即用甘遂散吹之亦須頻咽百草膏兼用煎劑不可間斷又用噙化丸吞化亦妙或七味殭蠶散八味薄荷散吹之先將山慈菰汁搽上然後吹藥則效速諤按山慈菰可研末和入吹藥中吹之則簡便而取效則一也惟分兩宜輕五治皯舌喉癰煎劑中須加犀角地黃湯並用甘遂散吹至舌根及舌旁時刻不可間斷方可速愈如癰勢重者再配入制巴豆兼吞上清丸六治纏喉風最為急症起時立用加味硝黃散或甘遂散周圍重吹並內服煎劑如便閉加大黃芒硝併吞上清丸如虛喉用噙化丸化咽如症候太重丹中加牛黃少許吹之稍遲則難救矣臭花娘子根搗汁咽之效七治酒毒喉如內外赤腫閉塞不通用牙硝硼砂食鹽加入開關散少許吹之立效煎劑加解毒藥治之八治鎖喉風如喉及牙關緊閉難以吹丹一時無以治療症又緊急頃刻之間用蟾酥磨水令患人仰面滴入鼻中到喉即開男左女右滴之治牙關閉者速吹甘遂散入開關散亦可用熏鼻方諤按鎖同鎖鎖緊之意也九治喉瘤最為難愈須患者斂神晏息為妙用麝香散一日夜連吹五六次漸愈並服清肺飲再加入四物湯治之十治喉肉球雖不損人最難速愈須令病人耐心為妙急用麝香散頻吹並服清肺飲徐徐灌之十一治心出氣急用赤小豆一升杵碎將水三碗和搗取汁每服一盞不拘時服再用槐花末摻之立效十二治喉百葉用臭橘葉煎服而愈如腫痛用連砂散頻吹為妙十三治牙槽風連砂散配入去腐方頻吹去其腐後用口疳藥倍加珠黃再配去腐方吹去紫色獨用長肉藥頻吹數日可愈煎劑養陰降火諤按高錦庭云此症患者有二因一生於風寒暑熱陽明濕熱交蒸一生於陰虧絡空少陽膽火上逆其膿結於盤牙盡處者為牙咬結於腮邊外為托腮結於牙根為牙癰如不急治俱轉變為骨槽治宜疏肝散郁育陰為主佐以解毒泄熱此症當與下數條參觀自得十四治牙漏此即牙槽風疳疔毒破後結成齒縫出白膿者極難調治槽漏兩症須戒酒色一切辛爆毒物調治用琥珀散吹之如腐亦同槽藥治之煎劑用滋陰降火之藥吹丹務要耐心頻吹自愈十五治牙咬癰先用甘遂散入制巴豆少許吹入患處外用押舌器擦開牙口再吹腫處自然消退而愈並服煎藥十六治牙皯毒先用甘遂散後用連砂散並服煎劑內加石膏連翹治之十七治牙宣內服煎劑宜用扶脾清火之藥外用珍珠散將新綿花指大捏成條蘸水再捏扁蘸藥塞患處以指抵之勿動一二次甚則二三次即止若並牙疳腐爛者即用長肉藥吹之如宣不止仍用珍珠散吹之先宜用涼血清胃之劑此實火而言也若牙根胃虛火動腐爛者外吹長肉藥內服清脾降火之劑十八治牙癰牙菌連砂散吹之兼用煎劑如腫甚宜加入甘遂散吹之如腐爛用口疳藥長肉為度十九治穿牙疔毒如重甚用甘遂散吹之並服涼血降火解毒之劑如輕者用連砂散若破黑腐配合去腐方吹之如無腐爛並腐去淨並用長肉藥內加牛黃珍珠倍加兒茶並服煎劑方可用涼血解毒降火之劑二十治舌癰連砂散吹舌根上並用煎劑內加犀角川連山梔二十一治木舌陰陽散先用生薑片擦之後摻為妙重用連砂散並甘遂散吹之煎劑加川連梔仁灶心土水飛沖服二十二治重舌薄荷冰片摻之並服燈心湯加煎藥服二十三治舌出三寸不收用熏鼻方將煙燻舌即收並服清心煎劑兼吹連砂散二十四治舌縮無言將芥菜子研末醋拌敷於頸上內服清心之劑二十五治紫舌脹用柳仙散內服犀角地黃湯加減如脹甚用連砂散吹之二十六治口舌嘴碎通用柳仙散二十七治蟻毒瘻制穿山甲末敷之愈如碎難收口配入長肉藥吹之服煎劑解毒二十八治頭面托腮等癰恐毒內攻吹用連砂散外敷三黃散二十九治上顎癰如腫未成膿者甘遂散已成膿者代針散吹之如破者用長肉等藥選用並服百草膏三十治老幼走馬牙疳一切惡毒臭爛連砂散配去腐方吹去腐肉後用長肉藥如腐未盡去腐方再加長肉藥吹之再服犀角解毒丸三十一治穿腮牙落之重疳連砂散配去腐方吹去黑腐後用螻蛄散合長肉藥吹之如侵蝕口鼻將蝕吹之並服解毒藥三十二治舌喉結毒久破難愈琥珀散頻吹三十三治咽喉腫痛風痰上壅宜上清噙化二丸審症虛實吞化並吹丹散隨症選用三十四治帝丁腫脹速用煅鹽點之如有泡者即將煅鹽配入冰片少許指甲末研勻同吹三十五治小兒螳螂子連砂散同桑螵蛸煅末吹之三十六治小兒雪口先將絲綿卷指蘸水拭去白翳用柳仙散如重換用連砂散吹之內服犀角解毒湯加連翹大力子如夾驚風加薄荷鉤藤三十七治小兒馬牙將銀針挑破出血青布蘸溫水拭淨以口疳藥或金墨搽之三十八治諸骨鯁連砂散合甘遂散加急性子吹之三十九治唇口破腫而硬服瀉黃散吹柳仙散或用井花水拌散頻拭唇口若舌口俱腫合導赤散服並吹連砂散四十治諸癰堅硬不消連砂散加甘遂散茜草根末吹之立軟
