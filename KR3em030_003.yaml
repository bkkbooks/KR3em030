body:
  text: 卷下醫方論上一甘遂散原名息雷禁凡仍原名者不注甘遂六分麵裹煨黑存性研末提淨牙硝一錢食鹽炒二錢薄荷二錢蒲黃一錢硼砂八分冰片三分上七味研末吹喉中此咽喉急症之神劑斬關擒王之大將也專治九種喉痹一切喉症無一不效如痰甚本方加蜒蚰梅如牙關緊閉痰涎壅塞欲斃者先吹開關散加牛黃肉桂皮末如死在須臾加臘月黑魚膽陰乾研末各少許如去膈下痰飲加玉丹少許重吹一管須令病人低頭流出毒痰為要然不可過用過則恐其痰盡津枯難治如喉風本方加臭花娘根末十分之二如結喉痹本方加制巴豆少許如赤甚本方加川連末十分之一如腫硬本方加茜草根末十分之三如喉癰雙連乳蛾本方加制巴豆十分之三如單蛾只用連砂散加制巴豆有膿則出無膿則散如食物中誤卷飛絲入喉生瘡腫痛將連砂散加山慈菰粉制巴豆各少許吹之獨吹亦妙如爛喉風赤腫亦將連砂散加山慈菰粉配合去腐方消退其腫或用鐘乳石散吹之如濕爛虛腐不收用制爐甘石同人參末入長肉藥吹之而愈如重舌木舌牙癰牙疔毒只用牙硝食鹽硼砂再加煅皂礬皂角刺末多加冰片滲之自消如穿牙疔毒腐爛將連砂散加去腐方或口疳藥治之即愈二陰陽散川連乾薑生蒲黃各一錢此丹專治婦女陰火舌腫敷之即消凡治木舌先將生薑蘸硼砂擦之後以此方敷之亦妙本方加兒茶青黛名加味陰陽散亦治口舌生瘡又名赴筵散諤按此方不獨治婦女凡男子喉症犯欲猝然失音咽腫等症均可用之然必審確是陰症方可施治三連砂散原名散云丹薄荷牙硝各二錢硼砂一錢蒲黃五分川連四分硃砂二分冰片三分此丹專治風熱喉症之聖藥如治走馬疳與骨槽風齒落重症者並用去腐方如螳螂子用桑螵蛸煅灰存性研末加冰片少許吹之立消或用馬勃配合亦妙如諸骨鯁加急性子為末即愈諤按治諸骨鯁用燈心灰白湯送下即愈雞骨用苧麻或香油魚骨用大蒜白糖或橄欖竹木鯁用鐵鏽誤吞針用吸鐵石朴硝頭髮繞喉用自己發燒灰服螺螄靨卡喉用鴨涎一物一制相反相承循環至理各有專方切勿泥急性子一味也急性子為鳳仙花子取其急性速行而已四散堅方茜草根末此藥專消堅塊將茜草根末配入連砂散內吹之立軟原書用䕡茹根近世無識者藥肆中亦不備故以茜根代之諤按閲微草堂筆記載西域有飛蟲名巴蠟者人為所齧必死惟食茜草根敷瘡即瘥按烏魯木多茜根其汁可染新絳則知茜根實出西藏而市肆者多贋也經文載四烏鰂一藘茹藘茹即茜根也今見茜根代䕡茹之疑故特質明於此五去腐方原名下馬仙銅緑一錢二分燈草灰六分川連三分冰片二分此方專治黑臭腐爛如走馬牙疳將此藥配入連砂散內吹之其腐即去六鐘乳石散原名珠黃散鐘乳石八分飛辰砂一分五釐人中白六分兒茶一錢二分制黃柏一錢龍骨五分薄荷一錢二分冰片四分此方專治爛牙疳之聖藥如症重加牛黃琥珀珍珠凡遇各色口疳若初起內熱甚及腫者本方多用薄荷冰片如不腫內熱不甚且由病久所致宜用長肉藥蓋其破處後用消腫藥吹之再吹長肉藥如走馬疳穿牙疔毒及骨槽風並初生小兒胎毒口疳本方加牛黃琥珀珍珠合去腐方並吹更妙如初起此疳黑腐重症先用去腐方合連砂散並吹之去其黑腐後吹此方長肉為妙若黑腐臭爛無血者不治以棉攪之肉有微紅者可治如先臭爛旋不臭又不知痛者不治如小兒黃色胎疳如干橘囊者不治如痧痘後口疳去黃柏龍骨加牛黃倍珍珠如口疳重症須加上好鍾乳及珍珠硃砂各少許入兒茶內同研細末更妙七柳仙散薄荷一錢兒茶八分青黛五分川連四分冰片二分二釐此方專治口舌碎痛先取野薔薇根煎湯漱口後吹此藥效八螻蛄散原名金鞭散活螻蛄上一味瓦上煅存性研末此治穿腮牙落仙劑配入鐘乳石散吹之以愈為度或獨吹亦妙九琥珀散原名餘珍散珍珠二分琥珀三分兒茶八分甘草一分冰片一分五釐乳石三分此治喉舌結毒之要藥先用絲綿卷筷上抹患處後吹此藥如廣瘡結毒本方內加輕粉少許十喉癬方原名仙鮮散煅食鹽六分蒲黃四分燈草灰三分滴乳石三分青黛二分兒茶五分冰片一分此治虛火喉癬之神劑如碎腐本方加牛黃珍珠琥珀龍骨如虛腐本方加人參末制爐甘石如吹藥即痛去煅食鹽十一蝕鼻方乾蟾蜍川連各二錢青黛八分麝香少許此專治疳爛鼻梁之要藥須用絲綿拭淨膿穢吹敷立效十二代針散膽星三分人指甲二三寸冰片五釐硃砂少許此治乳蛾成膿不穿將指甲用雙紅紙卷好燈上燒炭存性為末入辰砂冰片膽星研和吹入喉中少頃即出膿血自愈十三珍珠散珍珠四分龍骨三分冰片一分五釐象皮四分兒茶四分烏鰂骨四分乳香沒藥硃砂各三分老參三七五分降香節三分此專治牙宣如牙縫出血不止將新棉如指大捏成條蘸水再捏扁蘸藥塞患處以指抵之勿動一二次即止如碎爛用長肉藥仍用本方並用煎劑看虛實二火用之十四麝香散麝香一錢川連五分冰片一分五釐此方治喉瘤之神劑十五開關散牙皂一錢殭蠶八分此專治牙喉關閉吹之神效十六熏鼻方原名玉鑰匙巴豆不拘多少將巴豆壓紙上取油以紙捻成條點火吹滅以煙燻入鼻中流出清涕牙關自開十七勝煙筒萆麻子仁二粒巴豆肉二粒麝香少許將三味同研火紙卷燒熏吸鼻中牙關立開此治喉閉不通之聖藥諤按此數方可開後世內症用外治法無數法門即如溫熱症痰蒙熱閉等亦可用醋炭或麝香香油捻紙卷燒煙燻之亦可開十八山甲散原名天義散穿山甲煅研末治誤食毒蟻生瘡之聖藥獨敷即愈或加入鐘乳石散亦可十九珠黃散西黃五釐濂珠四分川連七分硃砂三分冰片當門子各一分西洋參一錢兒茶八分硼砂七分腰黃八分專治爛舌之聖藥如虛火上炎吹之立效二十消標散牙硝一分硼砂五分蒲黃蜒蚰梅腰黃各三分青黛二分冰片麝香各五釐烏梅肉四分炙存性此方專治喉症過服苦寒以致喉間結一柱肉或橫生或直下喉中稍疼名為喉標此藥漸點並內服滋陰之劑靜養自愈二十一青靈丹川柏一錢青黛兒茶各六分此方專治口碎加入柳仙散內吹之神效諤按凡用兒茶不可用火煅欲使之鬆脆須日曬即脆二十二紫雪丹石膏寒水石滑石各八兩升麻犀角片羚羊片各一兩元參二兩甘草八錢沉香屑木香屑各五錢上藥水煎取濃汁去渣投入提淨朴硝三兩六錢文火慢煎俟水氣將盡欲凝結時納硃砂冰片各三錢金箔一百張研細和勻收儲聽用此方治重舌木舌乃口舌生瘡或敷或服均妙景華按此即局方紫雪惟製法稍異諤按此方治熱症內陷痙厥用此可開若熱症而偏於風者用至寶熱蒙心包而見譫語用牛黃清心若系痰蒙氣閉則用蘇合香丸一症有一方何今人一遇閉厥輒手忙腳亂恐嚇病家不問其症之為痰為風為氣為熱亂寫清心至寶紫雪誤人生命毫釐千里可不慎哉二十三硇砂散原名清溪祕傳北庭丹番硇砂人中白各五分瓦上青苔溏雞矢瓦松即瓦花各一錢上藥用銀罐子二個將藥裝在罐內上以空罐對口合住鹽泥封固炭火煅紅三炷香為度候冷開罐將藥取出入麝香冰片各一分研細用之此方專治舌菌用磁針刺破將此藥點上再以蒲黃蓋之其症最惡初起如頭疼痛無皮朝輕暮重以此藥點之自然消縮若失治至舌爛穿腮大凶百無一生二十四固齒白玉膏宮粉一兩珍珠三錢麝香二錢象牙硝五錢以上四味研末用陽起石龍骨各一兩用殭蠶四十九條防風當歸川芎牙皂青鹽升麻白芷地骨皮各五錢細辛藁本各三錢用長流水濃煎汁去渣將陽起石龍骨火煅通紅入藥汁內七次焙乾研末再與宮粉等四味同研極細再用黃蠟三兩溶化拌入前藥末調和成膏用時攤油紙上貼患處閉口勿語而愈此方治牙宣齒搖不固將膏貼之神效二十五拔疔散硇砂白礬硃砂食鹽用鐵鏽刀燒紅將礬鹽放於刀上煅各等分擇丁日午時研末專治牙縫生疔腫起一粒如粟米狀痛連腮項若麻癢破流血水疼痛異常即黑疔屬腎火毒俱用銀刀挑破見血搽此藥即痊內服黃連解毒湯效二十六小薊散小薊百草霜炒蒲黃醋香附各五錢四味末之治牙衄血出不止即將此藥擦牙即愈二十七牢牙散龍膽草一兩五錢酒浸羌活地骨皮各一兩升麻四分四味末之治牙宣齒動將此藥擦之立愈二十八加味硝黃散原名禁藥牙硝二錢蒲黃五分冰片一分五釐殭蠶一分制牙皂一分二釐制白芷一分此方專治一切喉症如痰甚加蜒蚰梅二十九七味殭蠶散原名金丹制殭蠶白芷各一分牛黃少許牙硝一錢八分生蒲黃四分硼砂八分冰片二分加玉丹少許亦可三十八味薄荷散原名碧丹薄荷六分玉丹四分甘草冰片各一分牛黃多用百草霜三分燈草灰五釐制牙皂少許此二方專治咽喉急症之神劑若治喉風宜用前方七分本方三分吹之立效如痛緩獨用本方三十一銅緑散原名紅袍銅緑五分腰黃一錢冰片七釐五毫此方專治腎經黑色鐵皮疳及牙宣等症如牙齦與口唇內皮爛如雲片或齦中出血或口碎吹之立愈諤按此方冰片不妨加重市肆銅緑罕真不如代以畫家所用之石緑為妥青黛黃柏均可加入三十二加味銅緑散原名緑袍銅緑一錢腰黃五分冰片一分五釐炒食鹽六分炙山甲一錢專治實火走馬牙疳腐爛臭肉浮起先吹此藥候腐臭爛肉脫落後再用地骨皮散吹之即愈三十三紅棗散原名紫袍大紅棗用竹刀破開去核腰黃研末填入棗內瓦上炙脆研末用此專治脾經各色口疳齦腫腐爛牙疔等症如齦有毒必用此丹拔毒吹之立愈三十四地骨皮散原名黃袍鮮地骨皮五分洗淨去黑衣曬乾研末煅中白一錢蠶沙炙三分冰片二分五釐杜咸橄欖一錢五分瓦上炙鳳凰衣一錢瓦上炙黃狗屎中元米一錢洗淨曬乾此方專治各種虛火口疳腐爛不能飲食又治初生小兒馬牙雪口二症吹之立效亦可長肉三十五白田螺散原名白袍野荒田中白田螺殼三錢洗淨研末水飛兒茶一錢冰片二分此方專治肺疳光亮而硬或牙齦腐爛色白吹之即愈三十六人中白散人中白一兩煅黃柏五錢川連三分蠶退紙三錢煅冰片一錢專治痘後口疳要藥諤按余用中白散有兒茶青黛薄荷無川連蠶退紙用之亦效三十七抹口方榖樹汁抹患處立愈此治鵝口效方三十八牛黃益金散牛黃三分冰片五釐硼砂制殭蠶蜜炙黃柏各一錢半共研末用蜜調和塗患處或丸如龍眼大含化均愈專治虛火上炎咽喉生瘡破爛者三十九玉鑰匙硼砂五錢牙硝一兩五錢制殭蠶二錢冰片一分此方治風熱喉閉及纏喉風之神劑再加腰黃二錢名金鎖匙四十喉癬神方西黃冰片各一分山羊血二分血珀三分川連五分硼砂一錢青果核炭三分燈草灰五分共研末每一匙藥用一匙蜜調之放舌尖上徐徐咽下一日五次如不見效將本方加蜒蚰梅即愈乃治喉癬之聖藥四十一喉風急救神方土牛膝根俗名臭花娘根洗淨搗汁灌入口中如不能咽即令其人仰以汁滴入鼻中流至咽喉下亦可望開專治一切喉風乳蛾等症草雖輕淺其功甚大不可忽視或秋月採根陰乾研粉再用鮮根打汁拌干以備急用四十二冰硼散冰片一分五釐硼砂三錢五分制殭蠶三分牙硝二錢五分蒲黃七分制膽礬五分此方治一切急喉風雙單乳蛾喉癰牙關緊閉等症吹之愈四十三爛喉痧方烏牛糞尖一個瓦上煅人指甲一分男用女女用男西黃一分珍珠二分青黛一錢冰片二分人中黃一錢此方治爛喉痧之神藥吹入即愈如咽喉碎腐用薄蜜調之含咽亦效四十四三黃散生地黃君生蒲黃臣牛黃佐冰片使上為末用芭蕉汁調敷患處或用扁柏葉汁和蜜調塗或用後方亦可四十五又方生大黃一錢生蒲黃一錢冰片五釐麝香三釐上為末加白蜜調入薑汁蔥汁或芭蕉汁側柏葉汁均可以上二方專治頸癰面癰如腫硬未消氣滯血凝或痰凝結毒不散宜用薑蔥汁調塗此二方並治小兒丹毒神效切勿入口為要四十六熊膽冰黃散胡黃連兒茶硼砂各三錢熊膽牛黃各七分冰片三分共為末專治喉痹腫痛吹喉中痛處立效四十七柳黃散黃連黃柏蒲黃青黛硼砂胡黃連芒硝各等分冰片少許此方專治喉痛口舌生瘡破爛吹之立效醫方論下一上清丸元明粉二錢川連一錢月石一錢五分枯芩二錢薄荷三錢冰片四分桔梗一錢五分山豆根一錢五分甘草八分大黃三錢上研末蜜丸芡實大每吞一丸重則連吞一丸將藥含口中化下其腫漸消而愈此丸專治實火喉嚨腫痛之神藥也二噙化丸大原地煮八錢麥冬肉五錢烘乾山豆根五錢煮爛川黃柏三錢焙天花粉五錢煅食鹽三錢真青黛一錢五分元參四錢炒白柿霜一兩嫩玉竹二錢冰片一錢五分蒲黃三釐上為末如前和丸蒲黃為衣含化下一丸此丸專治虛火咽喉腫痛者諤按上方著重在心肺胃故治實火此方注意在肝脾腎故治虛火醫家必備之藥也三百草膏薄荷八分玉丹五分川貝一錢燈草灰五釐柿霜八分甘草一分五釐天花粉一錢冰片二分百草霜一分上藥研勻一處用白蜜調膏頻咽噙之即效此膏專治喉癬及喉菌等症若症重兼服煎劑並用吹丹如治喉刺玉丹薄荷忌用如見勞病已重津竭火炎之候亦不必用四內托護心散防毒攻心真緑豆粉一兩乳香去油五錢燈心灰少許諤按余治溫邪挾毒逆陷心包每用緑豆衣炒銀花朱燈芯為引方甚效可見用藥貴乎靈活不可拘執一途也五又方硃砂甘草各一錢乳香淨末三錢上藥共研末和勻以生甘草一兩煎濃湯調一匙時時呷之諤按此方不如前方清靈擬加入翹心山梔仁緑豆衣等同煎較妥如痰涎壅甚可服控涎丹數分六清肺飲治痰濕氣逆咳嗽貝母天花粉甘草上三味水煎服七犀角地黃湯治胃熱火邪吐衄犀角生地白芍丹皮又方再加解毒藥名犀角解毒湯諤按解毒如銀花生甘草料豆衣之屬上四味先用三物水煎去渣入犀角汁熱服八導赤散治口糜淋痛瀉火生地木通甘草梢上三味水煎服一方再加竹葉九四物湯通治血家百病當歸熟地川芎白芍十六一散一名天水散治表裡三焦濕熱瀉火滑石六兩甘草一兩研末新汲水調服或燈心湯下十一蜜煎導法治胃府無熱便閉者不宜輕攻用此法白蜜納銅器中微火煎如飴勿令焦俟可丸捻作挺如指許長如橄欖樣納入穀道中以手急抱欲大便時乃去之十二瀉黃散治胃火口瘡並治脾火防風甘草黑山梔藿香石膏上味炒研末蜜調服十三錢乙瀉黃散治胃熱火鬱及口瘡升麻防風白芷黃芩枳殼半夏石斛甘草水煎服十四清咽太平丸治膈熱咽痛薄荷川芎柿霜甘草防風犀角桔梗上為末蜜丸十五甘露飲治胃熱口瘡吐衄生地熟地天冬麥冬甘草石斛黃芩茵陳枳殼枇杷葉一方加犀角水煎服十六黃連解毒湯涼血清熱解毒口瘡可任之黃連黃柏黃芩水煎服此即三黃湯也十七涼膈散治膈上實熱酒浸大黃芒硝甘草連翹山梔薄荷黃芩竹葉開水泡去渣澄清飲之十八清胃散治齒齦出血口瘡牙宣等症升麻黃連當歸生地丹皮石膏水煎服十九瀉白散瀉肺火桑皮地骨皮甘草粳米水煎服一方加人參雲茯苓知母黃芩名加減瀉白散二十涼肺湯治肺中實熱知母貝母天冬麥冬黃芩陳皮甘草桑皮水煎服二十一消毒犀角飲治咽喉腫痛毒氣壅甚者犀角牛蒡荊芥防風薄荷桔梗如內熱加黃芩黃連水煎服二十二玉液上清丸治風熱上壅口舌生瘡咽喉腫痛等症薄荷四兩柿霜五兩桔梗四兩五錢甘草三兩五錢川芎一兩八錢百藥煎五錢四分砂仁四錢五分青黛三錢冰片二錢硼砂二錢元明粉三錢上十一味為末蜜丸如雞豆大每服一丸不拘時噙化二十三清咽訶子丸治咽喉煩渴訶子肉四錢薑汁拌麵煨葛根一兩二錢冰片一分五釐柿霜四錢百藥煎三錢甘草一錢上為末蜜丸如芡實大每服一丸二十四柏母丸治痰火鬱結咽喉不利貝母六錢川柏蜜炙一兩冰片一錢蜜丸如青豆大每服一丸二十五柏花丸治肺熱咳嗽貝母四錢川柏蜜炙一錢百合二錢款冬花二錢五分冰片三分蜜丸如青豆大每服一丸二十六除瘡落菌膏一名犀角膏余治童子出麻後舌生瘡出血如泉諸藥不效一旦舌出菌者三其子如狂即用此方噙服三五丸即落並治咽喉口舌生瘡生菌噙化即效真血珀生犀角辰砂茯神冰片各一錢人參酸棗仁各二錢上研末蜜丸如彈子大每服一丸麥冬湯下二十七利膈湯治脾肺火熱虛煩上壅咽痛生瘡薄荷荊芥防風桔梗甘草牛蒡人參或加殭蠶二十八玉屑無憂散治纏喉風痹咽喉腫痛咽物有礙或風涎壅滯口舌生瘡及骨鯁屑塵併除三尸去八邪闢瘟疫等症元參荊芥貫仲山豆根茯苓滑石甘草黃連硼砂各五錢寒水石砂仁各三錢上為末每服一錢二十九加味射干湯治喉痹腫痛射干生地各一錢桔梗連翹黃芩貝母元參甘草各七分荊芥五分牛蒡七分水煎服三十滋陰消痹湯治腫毒口瘡兼治咳嗽聲啞當歸生地沙參百部各一錢射干地骨皮知母麥冬桔梗炒黃芩各七分元參甘草各五分水煎服三十一清肺散火湯治肺中有伏火因風寒閉郁或過服寒涼火不得泄者杏仁紫蘇各一錢前胡旋覆花桑皮貝母麻黃桔梗各七分甘草五分蔥一莖姜一片水煎服三十二滋水開陰湯治未成癆瘵遽然聲啞有痰嗽者沙參二錢知母貝母各一錢甘草石菖蒲各三分蘇子陳皮升麻各七分訶子肉五分生薑一片紅棗二枚水煎服製藥一制玉丹法生明礬打碎如指大傾入銀罐內炭火煅以筷刺入罐底攪之無塊為度次將上好牙硝打碎投下約十分之三再將硼砂打碎投下亦十分之三再將生礬逐漸投下候其煬盡照前投硝硼少許如是逐層投完待至鋪起罐內發高如饅頭樣止方架炭火燒至乾枯然後用潔淨瓦一大片覆罐上一時取去將牛黃少許為末用水四五匙調勻滴丹上將罐仍入內火烘乾即取起連罐覆潔淨地上用紙襯地上再將碗覆之過七日收儲聽用輕鬆無堅紋者佳如有堅紋不堪用或留作蜜調藥中用煅時火候初宜緩火然亦不可過緩恐致礬僵不易溶化後必堅實中間及後須用武火又如礬未溶化即投硝硼必不盡溶勢必堅實罐須煨透不令爆碎傾過銀者不用此丹必多制愈久愈妙名曰玉丹二制黑魚膽法臘月取黑魚膽陰乾或人身袋盛哺脆研用三制燈草灰法擇白淨燈草放於金漆桌上噴清水燈草上用筆管一頭草住將燈草用竹筷築於管中再用紙塞一頭放火中燒竹通紅收出放在瓶中用濕手巾覆之待冷取出去竹灰收儲聽用必要黑色而成團者佳四制巴豆法將巴豆淨肉去衣用一兩以麻油七錢煮酒七錢同煎油酒盡為度取起放於礬中入銀罐內炭火煅以筷刺入罐底攪之無塊為佳連罐覆潔淨地上再用碗覆之過七日收儲聽用又法明礬三錢入銚溶化投入巴豆肉三粒待乾去巴豆研用名曰巴礬五制蜒蚰梅法四月間買青梅子搗碎去核放碗內投礬一層捉蜒蚰不拘多少待礬蜒蚰煬盡再投梅礬一層再捉蜒蚰投下煬盡至百日傾入銀罐中炭火煅之以筷刺入罐底攪之無塊為度待如饅頭樣發起者即取下連罐覆於地上以碗蓋之過七日後火毒出盡收儲用之又法將青脆大梅子去核打碎鋪在碗底內再將蜒蚰數條鋪梅肉上又將白礬末鋪於蜒蚰上逐層鋪完待其礬蚰化盡日中曬梅極乾研用或瓦上炙脆為末如痰涎壅塞喉風等症加入各吹藥中皆效或蜜湯同藥調和滲下咽喉亦可消痰神效六制琥珀法先用側柏子末入瓷鍋中再入琥珀於末中用炭火煮從巳至申別有異光即取起揚如粉重研細極為度七制指甲法用雙紅紙卷好指甲燒灰存性研末又法將指甲入無名異中同炒至指甲鬆脆去無名異研用八制硇砂法將硇砂研至無聲水飛過醋煮乾如霜用然硇砂能爛五金化人心為血細閲本草消食破瘀滯癥瘕不可多服九制螻蛄法須五月間取活螻蛄一個將抱退雞子軟白皮裹入大蛤蟆口內草縛泥固煅過取出研末聽用又法將螻蛄置瓦上煅存性不用大蛤蟆亦可十制煉鹽法將食鹽入清水中煬盡去泥腳取水煎煉再傾罐內炭火煅透白如霜者佳留久聽用
