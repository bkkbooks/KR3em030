body:
  text: 附錄驗方喉風奪命丹專治急喉風痰湧氣逆吹之立效真西黃珍珠當門子各一錢辰砂四錢槍硝一兩五錢即牙硝月石五錢殭蠶一錢雄精二錢人中黃一錢九味各研細末瓷瓶收儲勿泄氣如遇急喉風痰聲轆轆呼吸氣促者急吹此丹二三管痰即隨藥而下頃刻即愈奪命神丹也景華按急喉風乃喉症之最險者小兒每患之其症必痰潮上湧氣短欲絕有初起寒熱至三四日後發者有一二日發者有朝發夕死夕發旦死者總以痰湧氣促為的候如見此症急用此丹景華親試之果驗或用臭花娘根打汁灌之亦妙修園附刻急救方有一方與此相類其可異處亦用槍硝一兩五錢也黑吹藥方專治爛喉痧辰砂二錢元寸西黃月石各三分琥珀五分珍珠元明粉各二分冰片一錢皂莢五莢煅灰去筋子燈草灰少許方八三十粒煅黑存性即番木鱉也制豬膽六錢肉灰五分此味肉灰可疑未知何等肉灰姑存之制豬膽法川連殭蠶月石青黛雄黃牙硝白礬薄荷各五錢上八味研細末用雄豬膽四個將膽汗和藥拌勻仍納豬膽殼內立冬日放地坑中春分日取起再研如遇爛喉痧和入前方吹之神效輕者獨吹亦妙走馬疳方元寸青鹽雄黃珍珠西黃冰片各一分月石四分人中白五分銅綠八分九味研末加鱔血少許此方與陶廷昭走馬疳方同如遇牙疳腐爛吹之立效救急破棺丹老豬婆糞須於冬天收取置屋上日曬夜露約一月餘取下放炭火上煅至煙將絕時悶息聽用候四五月間採臭花娘根打汁拌入煅過豬糞內曬乾再拌再曬如是七次瓷瓶收儲凡遇喉蛾喉癰喉痹諸急症痰涎壅塞聲不能出氣息欲絕者此藥下咽即活倘牙關緊閉不能受藥滴入鼻中亦效又治暑天痧脹腹痛欲絕者涼水調下又治下疳腐爛麻油調敷景華按此即南陽豬膚湯意蓋豬水畜也母豬陰類也糞陰中之至濁者也喉症半屬陰虛火亢胃濁上蒸取母豬糞以入陰降濁又取杜牛膝根之升中有降能吐能下是以奏功甚速至治痧症亦以濁攻濁意然不如用馬糞煅灰為妙見吳鞠通溫病條辨諤按士翹先生治爛喉痧每用血清血清西藥也據傳繫馬溲所提之精華也服血清而效者固多服血清而蒙其害者亦復不少余見屢矣然終不如此方之穩王夢隱青龍白虎湯橄欖生蘆菔水煎服自注云此余自制方橄欖色青清足厥陰內寄之火風而靖其上騰之陷蘆菔色白化手太陰外來之燥熱而肅其下行之氣合而為劑消經絡留滯之痰解膏粱魚面之毒平時代茶可內喉症勿以平淡而忽諸王跋囊秘喉書一帙無卷數俞養浩先生得之某氏辛丑冬喉症盛行迄於明年之夏先生施藥之外謀刊是書以廣治法因其文義舛繆方名怪特一似鈴醫所為爰命景華重加釐訂謹就原文鉤稽審覈參以群說別為八篇刪取異名歸諸爾雅藥味銖兩悉仍其舊蕭君冬友與參訂之役商榷既定竟付殺青光緒二十八年四月新陽王景華跋張跋咽喉一症其來也速其勢也猛其致病之由也雜醫者審證用藥寒熱攻補各有所宜誠未可偏執一是也顧自來治喉症者無專書臨證者卒鮮把握自洞主仙師白喉忌表抉微之書出治喉症者遂相率而用寒涼依方而用效者害者互見未可以為盡善之書曩者友人贈予囊秘喉書一冊反復研究確有至理取而用之復有神效噫楊公之作是書也無陳氏寶之固已失傳然無王君為之釐定俞君為之刊刻則是書也亦仍歸於泯滅而已而諤也雖有此重訂廣布之願亦無從著手今幸編錄已臻完善不敢忘諸君之德故復贅數語以為跋民國四年乙卯八月海虞張諤汝偉書於壽石居南窗下增錄錄白喉治方二則並題詞蠹簡蟫編赤綠字千金龍史索洪蒙我從氣化求真諦玉版金題叩素宮此症始於北而行於南從前古法無可遵不得已而取傷寒中一陰一陽結為喉痹之方以治創出養陰清肺一法近人本此雖不皆效然妄汗搜風溫燥之弊可免玉鑰之喻可無愧矣但此書為治喉必守之法則可若謂治喉之法已盡於此則不可瑞愚好自用將曾治白喉見愈之方抄錄以免日久忘懷並以此法示門下及兒輩補石識此余受業師唐均良先生之作也偉增錄於此揚先生六仁風以拯天下之同胞也門人張諤拜識石龍丹治陰火上熾形寒裡熱大便堅結咽嗌微痛太陰元精石龍膽草川柏知母鹽水炒元參川貝母丹皮金銀花淡竹葉朱燈芯冬瓜子生苡米各研細末吹之煎服亦可惟元精石有商酌分量隨症定珠燕南飛散膏粱蘊熱痰膠肺胃煅石燕鎊羚羊天竹黃川貝母上濂珠烏犀尖生枳殼生白芍細菖蒲生決明生蛤殼天花粉山梔仁潼木通滑石丹皮水炒上十五味各研細末貯用霹靂針豬牙皂角一味醋炒枯研細用一秒時即得大吐牙疳外治二方症重者爛口亦可大黃三錢生研綠豆粉二錢炒研公丁香十粒研三味和勻以開水塗兩足心其患立瘥效如神另用青蔥管蘇梗煎濃汁熏洗兩足又方清香餅生香附生半夏等分研雞清調作餅貼男左女右湧泉穴初生小兒螳螂子雪口鵝口均治加入蔥白麝香更妙馬培之先生柳華散治一切風溫喉症腫痛紅脹單雙乳蛾口疳牙疳等症人中白碎金蒲黃粉月石川柏青黛研末各等分加冰片用之冰梅竹月丹均良心得方天竹黃月石綠萼梅冰片研細用諤按以上二方皆系余家常日用之要藥百試百驗之秘方今特登出以供眾採庶幾不負救世之婆心也治喉之法以上所錄略可稱備而病家往往於飲食之中一不留意以致復發而成壞者又不少茲特錄出家常食物數種以告患喉恙者汝偉志海蟄萊菔西瓜皮茶腿醬鴨淡菜乾貝腐衣洋菜菜乾麒麟菜以上菜品掛麵藕粉山藥冬瓜以上點品鹽水炒杏仁西瓜子梨松子肉青鹽陳皮廣橘以上雜食品雨前白殘花生蛤殼朱燈芯以上代茶品食物之可飲者固多茲不過擇其食之無害有益者略舉一二而已如貧家以菜乾代茶則尤為相宜
